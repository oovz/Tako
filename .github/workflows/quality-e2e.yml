name: Quality and E2E

# Reusable workflow that runs the build, lint, type-check, unit/integration
# tests, coverage check, and Playwright E2E tests. Called by:
#   - ci.yml        (on push to main and on pull_request)
#   - release.yml   (on tag push, to gate the release)
#   - live-e2e.yml  does NOT use this workflow; it runs its own live suite.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Lint
        run: pnpm lint
      - name: Type check
        run: pnpm type-check
      - name: Unit tests
        run: pnpm test:unit
      - name: Integration tests
        run: pnpm test:integration
      - name: Coverage check
        run: pnpm test:coverage

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: End-to-end tests
        run: pnpm test:e2e
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts
          path: |
            test-results
            .output
          if-no-files-found: ignore
