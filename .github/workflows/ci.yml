name: CI

# Continuous integration for branch pushes and pull requests. Release
# verification on tag pushes is handled by release.yml, which calls the same
# reusable quality-e2e.yml workflow so verification steps stay in one place.
# Keeping tags out of this trigger avoids a duplicate CI run when a developer
# pushes main and a tag in the same `git push` (each ref update emits its own
# push event; see https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#push).

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-e2e:
    uses: ./.github/workflows/quality-e2e.yml
