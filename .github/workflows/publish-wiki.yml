name: Publish Wiki

# Publishes the contents of wiki/ to the repository's GitHub Wiki tab.
#
# Uses the auto-provided GITHUB_TOKEN (no PAT needed). The token is scoped
# to this repository, masked in logs, and never available to forked PRs.
# Requires `permissions: contents: write` (set below).
#
# Prerequisite:
#   The wiki must be initialized via the GitHub web UI first — go to the
#   repo's Wiki tab and create at least one page. This creates the *.wiki.git
#   remote that this workflow pushes to. Without it, the clone will fail.

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
      - '.github/workflows/publish-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-wiki
  cancel-in-progress: true

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Publish wiki
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY}"
          wiki_url="https://x-access-token:${GH_TOKEN}@github.com/${repo}.wiki.git"

          tmp_dir="$(mktemp -d)"
          echo "Cloning wiki into $tmp_dir"

          # Clone the wiki repo. This fails if the wiki hasn't been initialized
          # via the GitHub web UI (the *.wiki.git remote doesn't exist until the
          # first page is created there). Bootstrapping via git push is not possible.
          if ! git clone --depth 1 "$wiki_url" "$tmp_dir" 2>/dev/null; then
            echo "::error::Wiki repo not found. Go to https://github.com/${repo}/wiki and create at least one page to initialize it, then re-run this workflow."
            exit 1
          fi

          # Remove all tracked files (keep .git) so deletions propagate.
          cd "$tmp_dir"
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cd -

          # Copy current wiki content.
          cp -r wiki/* "$tmp_dir/"

          # Commit and push if there are changes.
          cd "$tmp_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "chore: sync wiki from ${{ github.sha }}"
          git push origin master
